{% if teaching %}
<section id="teaching" class="section">
  {% if show_title %}<h2 class="section-title">Teaching</h2>{% endif %}
  <ul class="plain-list">
    {% for item in teaching %}
    <li class="plain-item">
      <span class="plain-main">{% if item.url %}<a href="{{ item.url }}" target="_blank" rel="noopener">{{ item.course }}</a>{% else %}{{ item.course }}{% endif %}</span>
      <span class="plain-meta">{{ item.role }}{% if item.institution %} · {{ item.institution }}{% endif %} · {{ item.term }}</span>
    </li>
    {% endfor %}
  </ul>
</section>
{% endif %}
