# Profile and site-wide configuration — the primary source of truth for the site.
# Every field below is rendered somewhere on the site. Edit values in place;
# keep the structure (keys and nesting) intact. This file is validated against
# schemas/profile.schema.json.

site:
    # The full URL where the site is published (used for canonical links and metadata).
    url: 'https://isaac-cf-wong.github.io'
    # Browser tab title and the name used in metadata.
    title: 'Isaac C. F. Wong'
    tagline: 'Postdoctoral Researcher'
    description:
        'Personal academic website of Isaac C. F. Wong — research, and
        publications.'
    language: 'en'
    # Accent colour used across the site (any valid CSS colour).
    accent: '#2563eb'
    # Pages of the site. Each entry becomes its own page at a clean URL:
    #   slug ""          -> "/"            (the home page)
    #   slug "news"      -> "/news/"
    # `nav: true` shows the page in the navigation bar (in this order).
    # `sections` lists the content blocks rendered on the page, top to bottom.
    # A block is either a plain name, or {name: <block>, preview: N} to show only
    # the N most recent items with a link through to the block's full page.
    # Available blocks: about, news, publications, experience, education,
    # projects, software, teaching, awards, presentations, contact.
    pages:
        - slug: ''
          label: 'Home'
          nav: true
          sections:
              - 'about'
              - { name: 'news', preview: 3 }
              - { name: 'publications', preview: 3 }
        - slug: 'publications'
          label: 'Publications'
          nav: true
          sections: ['publications']
        - slug: 'cv'
          label: 'CV'
          nav: true
          sections: ['experience', 'education', 'awards']
        - slug: 'projects'
          label: 'Projects'
          nav: true
          sections: ['projects']
        - slug: 'software'
          label: 'Software'
          nav: true
          sections: ['software']
        #- slug: 'teaching'
        #  label: 'Teaching'
        #  nav: true
        #  sections: ['teaching']
        - slug: 'talks'
          label: 'Presentations'
          nav: true
          sections: ['presentations']
        - slug: 'news'
          label: 'News'
          nav: true
          sections: ['news']
        - slug: 'contact'
          label: 'Contact'
          nav: true
          sections: ['contact']

profile:
    name: 'Isaac C. F. Wong'
    # Short role shown under the name, e.g. "PhD Candidate", "Assistant Professor".
    title: 'Postdoctoral Researcher'
    affiliation: 'ESAT/STADIUS, KU Leuven'
    location: 'Leuven, Belgium'
    # Site-root path to a profile photo (SVG, PNG, or JPG) under assets/.
    photo: '/assets/img/profile.svg'
    email: 'chunfung.wong@kuleuven.be'
    # Site-root path to a CV file to link from the site. Leave empty ("") to hide it.
    cv: '/assets/cv.pdf'
    # A short biography. Markdown is supported (links, emphasis, lists).
    bio: |
        I am a postdoctoral researcher at the STADIUS Center for Dynamical Systems,
        Signal Processing and Data Analytics at KU Leuven, working in gravitational-wave data analysis and statistical inference.
        My research focuses on next-generation gravitational-wave detectors such as the Einstein Telescope, with interests spanning Bayesian inference,
        detector characterization, correlated noise modeling, null-stream methods, and model-independent tests of gravity.

        I am particularly interested in developing scalable and statistically robust analysis techniques for future gravitational-wave astronomy, including
        simulation-based inference, machine learning methods, and approaches for probing fundamental physics beyond General Relativity.

        Beyond research, I enjoy building open-source scientific software and exploring the intersection between AI systems, scientific computing, and research workflows.
    research_interests:
        - GW Data Analysis
        - Bayesian Inference
        - Einstein Telescope
        - ML for Astrophysics
    # Social and academic profile links. `icon` must match a key in the icon set
    # (see templates/partials/icons.html): scholar, orcid, github, linkedin,
    # twitter, mastodon, bluesky, email, cv, arxiv, researchgate, semantic-scholar.
    social:
        - {
              label: 'Email',
              icon: 'email',
              url: 'mailto:chunfung.wong@kuleuven.be',
          }
        - {
              label: 'Google Scholar',
              icon: 'scholar',
              url: 'https://scholar.google.com/citations?user=uuauSBYAAAAJ&hl=en&authuser=1',
          }
        - {
              label: 'ORCID',
              icon: 'orcid',
              url: 'https://orcid.org/0000-0003-2166-0027',
          }
        - {
              label: 'GitHub',
              icon: 'github',
              url: 'https://github.com/isaac-cf-wong',
          }
        - {
              label: 'LinkedIn',
              icon: 'linkedin',
              url: 'https://www.linkedin.com/in/isaac-chun-fung-wong-650b1220a',
          }

# Automated publication sync (used by `isaac-cf-wong publications sync` and the
# .github/workflows/sync-publications.yml scheduled workflow).
publications_sync:
    # Your ORCID iD — used to resolve your INSPIRE author profile.
    orcid: '0000-0003-2166-0027'
    # How your name should appear (and be emphasised) in fetched author lists.
    author_name: 'C. F. Wong'
    # When true, only papers you have *claimed* on your INSPIRE author profile are
    # listed. Claiming a paper on INSPIRE is your "I contributed to this" signal:
    # claim the collaboration papers you want shown, leave the rest unclaimed.
    # Set to false to fetch every paper assigned to your profile (unclaimed ones
    # are written with include: false so you can opt them in locally).
    claimed_only: true
