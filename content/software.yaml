# Open-source software you maintain, shown grouped by `category`.
# Items are grouped in the order their category first appears, so list the
# entries of the category you want shown first at the top.
#
# Each item:
#   name      (required) the package / repository name
#   category  (required) the group heading, e.g. 'Packages', 'Templates', 'Tools'
#   summary   one-line description (Markdown allowed)
#   role      optional, e.g. 'Maintainer', 'Author', 'Contributor'
#   license   optional SPDX id shown as a badge, e.g. 'MIT', 'Apache-2.0'
#   tags      short keywords, e.g. language or domain
#   links     list of {label, url}, e.g. Repo / Docs / PyPI / 'Use template'
#
# Set `items: null` to hide the whole section.
# Validated against schemas/software.schema.json.

items:
    - name: 'bibsync'
      category: 'packages'
      summary:
          'bibsync synchronizes BibTeX files from citation keys in LaTeX
          sources. It is inspired by adstex, with provider support for both NASA
          ADS and InspireHEP.'
      role: 'maintainer'
      tags: ['python', 'rust', 'bibtex']
      license: 'BSD 3-Clause'
      links:
          - { label: 'repo', url: 'https://github.com/isaac-cf-wong/bibsync' }
          - { label: 'crates.io', url: 'https://crates.io/crates/bibsync' }
          - { label: 'pypi', url: 'https://pypi.org/project/bibsync/' }

    - name: 'gwmock'
      category: 'packages'
      summary:
          'A python package for generating mock data challenge datasets for the
          gravitational-wave community.'
      role: 'maintainer'
