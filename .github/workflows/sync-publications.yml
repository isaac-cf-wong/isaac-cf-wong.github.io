name: Sync publications

on:
    schedule:
        - cron: '0 6 * * 1' # Mondays at 06:00 UTC
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: sync-publications
    cancel-in-progress: true

jobs:
    sync:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Install uv
              uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
              with:
                  enable-cache: true

            - name: Sync publications from INSPIRE-HEP
              run: uv run isaac-cf-wong publications sync

            - name: Open pull request for review
              uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
              with:
                  branch: chore/sync-publications
                  delete-branch: true
                  commit-message: 'chore: sync publications from INSPIRE-HEP'
                  title: 'chore: sync publications from INSPIRE-HEP'
                  labels: |
                      publications
                      automated
                  body: |
                      Automated publication sync from INSPIRE-HEP (keyed on your ORCID iD).

                      Lists the papers you have **claimed** on your INSPIRE author profile.
                      To change what appears here, claim or unclaim papers on INSPIRE; this
                      sync will reflect that on its next run.

                      Your `include` / `highlight` decisions on existing entries are
                      preserved across syncs.
